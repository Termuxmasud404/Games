<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Talha's Run - Pro</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #000;
}

/* INTRO */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #222, #000);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: white;
}

#intro h1 {
    font-size: 50px;
    color: gold;
    animation: glow 2s infinite;
}

@keyframes glow {
    0% {text-shadow: 0 0 10px red;}
    50% {text-shadow: 0 0 25px yellow;}
    100% {text-shadow: 0 0 10px red;}
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

/* GAME */
#game {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
    background: linear-gradient(#87CEEB, #228B22);
    overflow: hidden;
}

.player, .cop, .obstacle, .coin {
    position: absolute;
}

/* PLAYER */
.player {
    width: 50px;
    height: 50px;
    background: red;
    bottom: 80px;
    left: 50px;
}

/* COP */
.cop {
    width: 50px;
    height: 50px;
    background: blue;
    bottom: 80px;
    left: 200px;
}

/* OBSTACLE */
.obstacle {
    width: 40px;
    height: 60px;
    background: black;
    bottom: 80px;
}

/* COIN */
.coin {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: gold;
    bottom: 150px;
}

/* SCORE */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
    color: white;
    z-index: 5;
}

/* GAME OVER */
#gameOver {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 20;
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
    <h1>The Talha's Run</h1>
    <p>🏃 Talha is escaping from Police 🚓</p>
    <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game">

<div id="score">Score: 0</div>

<div class="player" id="player"></div>
<div class="cop" id="cop"></div>

<div class="obstacle" id="obstacle"></div>
<div class="coin" id="coin"></div>

</div>

<!-- GAME OVER -->
<div id="gameOver">
    <h1>Game Over 💥</h1>
    <button onclick="location.reload()">Restart</button>
</div>

<script>

let gameStarted = false;
let score = 0;

// positions
let px = 50, py = 80;
let cx = 200;
let jump = false;

// start game
function startGame(){
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "block";
    gameStarted = true;
}

// player control
document.addEventListener("keydown", function(e){
    if(!gameStarted) return;

    if(e.key == "ArrowRight") px += 10;
    if(e.key == "ArrowLeft") px -= 10;

    if(e.key == " " && !jump){
        jump = true;
        let up = 0;
        let jumpInt = setInterval(()=>{
            if(up < 100){
                py += 5;
                up += 5;
            } else {
                clearInterval(jumpInt);
                let down = setInterval(()=>{
                    if(py > 80){
                        py -= 5;
                    } else {
                        clearInterval(down);
                        jump = false;
                    }
                },20);
            }
        },20);
    }

    updatePlayer();
});

function updatePlayer(){
    document.getElementById("player").style.left = px + "px";
    document.getElementById("player").style.bottom = py + "px";
}

// obstacle move
let ox = 600;
function moveObstacle(){
    ox -= 6;
    if(ox < -50) ox = 600;

    document.getElementById("obstacle").style.left = ox + "px";

    // collision
    if(ox < px+40 && ox > px-40 && py <= 100){
        gameOver();
    }
}

// coin
let coinX = 400;
function moveCoin(){
    coinX -= 4;
    if(coinX < -30) coinX = 600;

    document.getElementById("coin").style.left = coinX + "px";

    if(coinX < px+40 && coinX > px-40){
        score += 10;
        coinX = 600;
        document.getElementById("score").innerText = "Score: " + score;
    }
}

// cop AI
function chase(){
    if(cx < px) cx += 2;
    else cx -= 1;

    document.getElementById("cop").style.left = cx + "px";

    if(Math.abs(cx - px) < 30){
        gameOver();
    }
}

// game over
function gameOver(){
    document.getElementById("gameOver").style.display = "flex";
    gameStarted = false;
}

// loop
function loop(){
    if(gameStarted){
        moveObstacle();
        moveCoin();
        chase();
    }
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
