<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Talha's Run - Next Gen</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial;
}

/* CANVAS */
canvas {
    display: block;
    background: linear-gradient(#87CEEB, #228B22);
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER (Talha)
let player = {
    x: 80,
    y: canvas.height - 120,
    w: 50,
    h: 50,
    vy: 0,
    jump: false
};

// COP
let cop = {
    x: 300,
    y: canvas.height - 120,
    w: 50,
    h: 50
};

// COIN
let coin = {
    x: 600,
    y: canvas.height - 150,
    r: 15
};

// OBSTACLE
let obstacle = {
    x: 800,
    y: canvas.height - 120,
    w: 40,
    h: 60
};

let gravity = 0.8;
let score = 0;
let gameOver = false;

// KEY CONTROL
document.addEventListener("keydown", (e)=>{
    if(e.key === "ArrowRight") player.x += 15;
    if(e.key === "ArrowLeft") player.x -= 15;

    if(e.key === " " && !player.jump){
        player.vy = -15;
        player.jump = true;
    }
});

// COLLISION CHECK
function collide(a,b){
    return a.x < b.x + (b.w || b.r*2) &&
           a.x + a.w > b.x &&
           a.y < b.y + (b.h || b.r*2) &&
           a.y + a.h > b.y;
}

// GAME LOOP
function update(){

    if(gameOver){
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "50px Arial";
        ctx.fillText("Game Over 💥", canvas.width/2 - 150, canvas.height/2);
        ctx.font = "25px Arial";
        ctx.fillText("Score: " + score, canvas.width/2 - 60, canvas.height/2 + 50);
        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // GRAVITY
    player.y += player.vy;
    player.vy += gravity;

    if(player.y > canvas.height - 120){
        player.y = canvas.height - 120;
        player.jump = false;
    }

    // COP AI CHASE
    if(cop.x < player.x) cop.x += 2;
    else cop.x -= 1;

    // OBSTACLE MOVE
    obstacle.x -= 6;
    if(obstacle.x < -50) obstacle.x = canvas.width + 200;

    // COIN MOVE
    coin.x -= 4;
    if(coin.x < -20) coin.x = canvas.width + 300;

    // SCORE CHECK (coin)
    if(Math.abs(player.x - coin.x) < 40 && Math.abs(player.y - coin.y) < 40){
        score += 10;
        coin.x = canvas.width + 200;
    }

    // COLLISION
    if(collide(player, obstacle) || Math.abs(player.x - cop.x) < 40){
        gameOver = true;
    }

    // DRAW PLAYER
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // DRAW COP
    ctx.fillStyle = "blue";
    ctx.fillRect(cop.x, cop.y, cop.w, cop.h);

    // DRAW OBSTACLE
    ctx.fillStyle = "black";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    // DRAW COIN
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, coin.r, 0, Math.PI*2);
    ctx.fill();

    // SCORE
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 20, 30);

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
